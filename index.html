<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>국립한글박물관</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <a class="site-menu" href="#contents">펼쳐보기</a>

    <main>
      <section class="hero" aria-label="국립한글박물관 히어로">
        <div class="hero-sticky">
          <div class="hero-webgl" aria-hidden="true"></div>
          <div class="hero-copy-group">
            <div class="hero-brand" aria-label="국립한글박물관 문화체육관광부">
              <img class="hero-brand-mark" src="./assets/icons/brand-mark.svg" alt="" aria-hidden="true" />
              <span>국립한글박물관 문화체육관광부</span>
            </div>

            <div class="hero-copy" aria-live="polite">
              <h1 class="hero-title hero-title-initial is-active">
                <span class="hero-title-strong">한글의 시작</span><span class="hero-title-light">은 글자가 아니었습니다.</span>
              </h1>

              <p class="hero-title hero-title-next">
                <span class="hero-title-light">사람을 향한</span><span class="hero-title-strong"> 마음</span><span class="hero-title-light">이었습니다.</span>
              </p>
            </div>

            <p class="hero-scroll">아래로 내려보기</p>
          </div>
        </div>
      </section>

      <section id="king-people" class="section-king-people" aria-label="왕과 백성">
        <div class="king-people-sticky">
          <div class="king-people-webgl" aria-hidden="true"></div>
          <div class="king-people-scene king-people-scene-video is-active" aria-label="왕과 백성 영상">
            <div class="king-people-video-frame">
              <video class="king-people-video" src="./assets/videos/king-people/king-people.mp4" autoplay muted loop playsinline></video>
            </div>
          </div>

          <div class="king-people-scene king-people-scene-heart" aria-label="닿지 못한 마음">
            <div class="king-people-heart-webgl" aria-hidden="true"></div>
            <img
              class="king-people-scene-bg"
              src="./assets/images/king-people/king-people-bg-02.webp"
              alt=""
              aria-hidden="true"
            />
            <div class="king-people-text-panel">
              <div class="king-people-title">
                <p class="king-people-title-number">01</p>
                <h2 class="king-people-main-title">닿지 못한 마음</h2>
              </div>
              <div class="king-people-description">
                <p>왕은 백성의 말을 들을 수 없었고,<br>
                백성은 <strong>자신의 마음</strong>을 전할 수 없었습니다.</p>
                <p aria-hidden="true">&nbsp;</p>
                <p>세종은 문자를 만든 것이 아니라<br>
                사람과 <strong>사람을 잇는 방법</strong>을 만들고자 했습니다.</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="contents" class="contents" aria-label="본문"></section>
    </main>
    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
